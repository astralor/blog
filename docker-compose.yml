services:
  blog:
    container_name: astralor-blog
    image: ghcr.io/astralor/blog:latest
    network_mode: bridge
    ports:
      - 8080:80
    volumes:
      - /etc/localtime:/etc/localtime:ro
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

  waline:
    container_name: astralor-waline
    image: lizheming/waline:latest
    network_mode: bridge
    ports:
      - 8360:8360
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./data/waline:/app/data
    environment:
      - SQLITE_PATH=/app/data/waline.sqlite
      - SITE_NAME=Astralor
      - SITE_URL=https://astralor.com
      - SECURE_DOMAINS=astralor.com
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8360"]
      interval: 30s
      timeout: 10s
      retries: 3
