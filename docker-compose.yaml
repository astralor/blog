services:
  blog:
    container_name: astralor-blog
    image: ghcr.io/astralor/blog:latest
    network_mode: bridge
    ports:
      - "${BLOG_PORT:-8080}:80"
    volumes:
      - /etc/localtime:/etc/localtime:ro
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

  waline:
    container_name: astralor-waline
    image: lizheming/waline:latest
    network_mode: bridge
    ports:
      - "${WALINE_PORT:-8360}:8360"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./data/waline:/app/data
    environment:
      - IPADDR=0.0.0.0
      - SQLITE_PATH=/app/data
      - JWT_TOKEN=d7eed6cd64460f98a8000210f9201126d00ccb6afbe40e4b362a1926614c6bd7
      - SITE_NAME=Astralor
      - SITE_URL=https://astralor.com
      - SECURE_DOMAINS=astralor.com,comment.astralor.com
    restart: always
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8360').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
